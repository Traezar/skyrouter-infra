{{- if .Values.jobs.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "backend.fullname" . }}-fetch-flights
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.jobs.fetchFlights.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "backend.fullname" . }}-fetch-flights
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: Never
          containers:
            - name: fetch-flights
              image: "{{ .Values.jobs.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args: ["fetch-flights"]
              envFrom:
                - secretRef:
                    name: {{ .Values.envSecret }}
              env:
                {{- range $key, $val := .Values.env }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
{{- end }}
